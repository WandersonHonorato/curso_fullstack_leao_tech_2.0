<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        table, td, tr, th{
            border: 1px, solid,
            black;
            border-collapse: collapse;
            padding: 3px;
        }

    </style>


</head>
<body>
    
    <h1>Trabalhando com Tabelas</h1>

    <table>
         <tr>   <!-- tr é um alinha -->
            <th>Nome</th> <!-- tr é um cabeçalho de coluna -->
             <th>Idade</th>
             <th>Cidade</th>

        <tr>
            <td>Wanderson</td>
            <td>27</td>
            <td>Horizonte</td>
        </tr>

        <tr>
            <td>Chico</td>
            <td>98</td>
            <td colspan="2">Cique-Xique</td>

        </tr>

        <table>
    <br>
    <hr>
    <br>
        <table> 

            <tr>
                <th>Linguagens</th> <!-- th é uma linha -->
                <th>Frameworks</th>
            </tr>
            <tr>
                <td rowspan="2">Java</td>
                <td>Spring Boot</td>
            </tr>
            <tr>
                <td>Spring Data</td>
            </tr>
            <tr>
                <td rowspan="2">JavaScript</td>
                <td>AngularJS</td>
            </tr>
            <tr>
                <td>ReactJS</td>
            </tr>

        </table>

</body>
</html>
