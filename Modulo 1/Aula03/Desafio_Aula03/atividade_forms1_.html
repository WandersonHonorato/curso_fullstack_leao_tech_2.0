<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>
        .main-forms {background-color: rgba(197, 194, 194, 0.9); 
            padding: 20px 20px 20px 20px;
            border-radius: 15px;}
        input {
            border-radius: 20px 20px 20px 20px; padding: 3px 3px 3px 3px;
        }
        .textarea { border-radius: 15px;

        }
    </style>
</head>
<body>

    <h1>Formulário de Candidatura</h1>
    <br>

<form action=""></form>

<div class="main-forms">
        <label for="Nome">Nome:</label>
    <input id="Nome" name="Nome" type="text" placeholder="Ex: Wanderson" required>
    <br><br>
        <label for="email">E-mail:</label>
    <input id="email" name="email" type="email" placeholder="Ex: Wanderson@gmail.com" required>
    <br><br>

        <label for="">Cargo de Tecnologia:</label>
    <select name="Cargo de Tecnologia" id="cargo" >
    <option value="">--Pessoa Desenvolvedora--</option>
    <option value="back">Backend</option>
    <option value="front">Frontend</option>
    <option value="qa">QA</option>
    <option value="DBA">DBA</option>
    </select>
    <br><br>

 
    <label for="">Genero:</label><br>

        <label for="Genero">Masculino</label>
    <input type="radio" name="Genero" id="m" value="m">
        <label for="Genero"> Feminino</label>  
    <input type="radio" name="genero" id="f" value="f">
            <label for="Genero">Outro</label>
    <input type="radio" name="genero" id="o" value="o">
    <br><br>

            <label for="Local">Unidade de interesse:</label><br>
        <input type="checkbox" name="unidade" id="fortaleza" value="fortaleza">
             <label for="Local">Fortaleza</label>
        <input type="checkbox" name="unidade" id="horizonte" value="horizonte">
             <label for="Local">Horizonte</label>
        <input type="checkbox" name="unidade" id="eusebio" value="eusebio">
             <label for="Local">Eusébio</label>
            <br><br>

            <label for="depoimento">Fale mais sobre você:</label><br>
        <textarea 
        class="textarea" name="depoimento" id="depoimento" rows="5" cols="30" maxlength="300" required >
        </textarea>
        
        <br><br>
        <input type="submit" value="Enviar">

</div>
</form>

</body>
</html>
