<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>

    <h1>Formulários</h1>
    
 <form action="">
    <label for="nome">Nome</label><br>
    <input type="text" name="" id="nome" placeholder="Ex: João" required>
    <br><br>
    <label for="senha">Senha:</label><br>
    <input type="password" name="senha" id="senha" placeholder="password" required>
    <br><br>
    <label for="email">Email</label><br>
    <input type="email" name="email" id="email"placeholder="Ex: joao@gmail.com" required>
    <br><br>
    <label for="idade">Idade</label><br>
    <input type="number" name="idade" step="1" min="1" max="120" id="idade" required>
    <br><br>

    <h3>Vaga</h3>
   
    <!--QUando o input não for para digitar, tem que colocar o value-->
    <input id="back" type="radio" name="Vaga" value="back"> 
    <label for="back">Backend</label>
    <br>
    <input id="front" type="radio" name="vaga" value="front">
    <label for="front">FrontEnd</label>
    <br>
    <input id="front" type="radio" name="vaga" value="QA">
    <label for="front">QA</label>
    <br>
      <input id="front" type="radio" name="vaga" value="data">
    <label for="front">Data Analyst</label>
    <br>
    <input id="front" type="radio" name="vaga" value="dba">
    <label for="front">DBA</label>

    <h3>Linguagens Conhecidas</h3>

    <input type="checkbox" name="Linguagens" id="java" value="java">
    <label for="java">Java</label><br>
        <input type="checkbox" name="Linguagens" id="JavaScript" value="JavaScript">>
    <label for="JavaScript">JavaScript</label><br>
        <input type="checkbox" name="Linguagens" id="Phyton" value="Phyton">>
    <label for="Phyton">Phyton</label><br>
        <input type="checkbox" name="Linguagens" id="Typescript" value="Typescript">>
    <label for="Typescript">Typescript</label><br>
        <input type="checkbox" name="Linguagens" id="Go" value="Go">
    <label for="Go">Go</label><br>
        <input type="checkbox" name="Linguagens" id="Ruby" value="Ruby">>
    <label for="Ruby">Ruby</label><br>
        <input type="checkbox" name="Linguagens" id="Dart" value="Dart"> >
    <label for="Dart">Dart</label><br>
        <input type="checkbox" name="Linguagens" id="Kotlin" value="Kotlin">>
    <label for="Kotlin">Kotlin</label>
    <br><br><br>

    <label for="comentario">Comentário:</label><br>
    <textarea name="comentario" id="comentario" rows="5"
    cols="30" placeholder="Ex: Eu tenho experiência em..." maxlength="10" required>
    </textarea>
    <br><br><br>


    <label for="cidade">Cidade</label><br>
    <select name="" id="">
        <option value="null">--Selecione--</option>
        <option value="Fortaleza">Fortaleza</option>
        <option value="Maracanau">Maracanau</option>
        <option value="Horizonte">Horizonte</option>
        <option value="Eusébio">Eusébio</option>
    </select>
    <br><br><br><br>


    <input type="submit" value="Enviar" name="" id="">

 </form>
    
</body>
</html>
