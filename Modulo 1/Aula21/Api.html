<div class="row ms-5 mt-5">
    <div class="col-12 ms-3">
        <h1>Fake Store</h1>
    </div>
    <div class="col-4">
        <input id="product" type="text" class="form-control" placeholder="Digite o id do produto">
    </div>
    <div class="col-6">
        <button onclick="buscarID()" class="btn btn-info">Verificar Produto</button>
        <button onclick="limparCampo()" class="btn btn-warning" >Limpar Campo</button>
    </div>
    <div id="resultado" class="row mt-5">

    </div>

</div>

<script>

    function buscarID() {
        let InputId = document.getElementById('product')
        let id = InputId.value
    
        let url = `https://fakestoreapi.com/products/${id}`
        
        fetch(url)
            .then(resposta => resposta.json())
            .then(dados => {
                console.log(dados)
                let resultado = document.getElementById('resultado')
                resultado.innerHTML = `
        <div class="card" style="width: 300px;">
            <img src="${dados.image}" class="card-img-top" alt="...">
            <div class="card-body">
                <h5 class="card-title">${dados.title}</h5>
                <p class="card-text">${dados.description}</p>             
 `});

 
        function limparCampo() {
            document.getElementById("limpar").value = "";

        }
    }



</script>
